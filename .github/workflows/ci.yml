name: ci

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - dev
  workflow_dispatch:

env:
  PUBLIC_API_URL: https://api.arthurplazanet.com

jobs:
  lint_format:
    if: ${{ ! startsWith(github.event.pull_request.head.ref, 'renovate/') }}
    name: Lint, Format and build - Node version 22
    uses: ./.github/workflows/lint_format.yml
    with:
      node_version: 22

  build:
    if: ${{ ! startsWith(github.event.pull_request.head.ref, 'renovate/') }}
    uses: ./.github/workflows/build.yml
    with:
      node_version: 22
      PUBLIC_API_URL: ${{ env.PUBLIC_API_URL }}

      # SSH_KEY: ${{ secrets.SSH_KEY }}

  deploy:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: website-build
          path: ./dist/

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          known_hosts: unnecessary

      - name: Adding Known Hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy build with rsync
        run: rsync -avz ./dist/ ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/var/www/arthurplazanet.com/arthurplazanet.com/
